spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/accounting_saas
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  # ── JPA (dev) ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # ── Flyway (dev) ──
  flyway:
    validate-on-migrate: false

  # ── RabbitMQ ──
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379

  # ── E-mail (Dev/Mailtrap) ──
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:default_username}
    password: ${MAIL_PASSWORD:default_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # ── Google OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/adwords
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email
# ── Google Ads API ──
api:
  google-ads:
    developer-token: ${GOOGLE_ADS_DEVELOPER_TOKEN:mock-developer-token}
    client-customer-id: ${GOOGLE_ADS_CLIENT_CUSTOMER_ID:mock-client-customer-id}
    client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
    redirect-uri: http://localhost:8080/api/v1/integrations/google-ads/callback

# ── Logging (dev) ──
logging:
  level:
    com.projetocontabil: INFO
    com.projetocontabil.infra.integrations: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

# ── Mailtrap (dev) ──
mailtrap:
  api-token: ${MAILTRAP_API_TOKEN:mock-mailtrap-api-token}
  sender-email: ${MAILTRAP_SENDER_EMAIL:noreply@contabilpro.com.br}
  sandbox: ${MAILTRAP_SANDBOX:true}
  inbox-id: ${MAILTRAP_INBOX_ID:4464001}

# ── SERPRO (dev) ──
serpro:
  api-base-url: ${SERPRO_API_BASE_URL:https://gateway.apiserpro.serpro.gov.br/renda-pf-trial/v1}
  base-url-prod: ${SERPRO_BASE_URL_PROD:https://gateway.apiserpro.serpro.gov.br/renda-pf/v1}
  token-url: ${SERPRO_TOKEN_URL:https://gateway.apiserpro.serpro.gov.br/token}
  consumer-key: ${SERPRO_CONSUMER_KEY:53R9kVlGIoFMQoO3ibua2Klf9uYa}
  consumer-secret: ${SERPRO_CONSUMER_SECRET:NiRIBkJiWqGYPlAfDcMQQQW_aPEa}
  private-key-base64: ${SERPRO_PRIVATE_KEY_BASE64:mock-private-key}
