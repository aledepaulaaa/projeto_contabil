    enabled: ${CONTAAZUL_DEV_MODE_ENABLED:true}

# ── Resilience4j ──
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
    instances:
      asaas:
        baseConfig: default
      zapsign:
        baseConfig: default
      contaazul:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpClientErrorException.TooManyRequests
          - org.springframework.web.client.HttpServerErrorException.ServiceUnavailable
          - org.springframework.web.client.HttpServerErrorException.GatewayTimeout
    instances:
      asaas:
        baseConfig: default
      zapsign:
        baseConfig: default
      contaazul:
        baseConfig: default

# ── Mailtrap ──
mailtrap:
  api-token: ${MAILTRAP_API_TOKEN}
  sender-email: ${MAILTRAP_SENDER_EMAIL:noreply@contabilpro.com.br}
  sandbox: ${MAILTRAP_SANDBOX:false}
  inbox-id: ${MAILTRAP_INBOX_ID:0}
