# Projeto Contábil — Perfil de Desenvolvimento
# ══════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accounting_saas
    username: admin
    password: password
    hikari:
      maximum-pool-size: 10

  # ── JPA (dev) ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ── RabbitMQ ──
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379

# ── Logging (dev) ──
logging:
  level:
    com.projetocontabil: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
