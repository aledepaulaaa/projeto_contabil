# Projeto Contábil — Perfil de Desenvolvimento
# ══════════════════════════════════════════════════════════

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/accounting_saas
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  # ── JPA (dev) ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ── RabbitMQ ──
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379

  # ── E-mail (Dev/Mailtrap) ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:user}
    password: ${MAIL_PASSWORD:pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # ── Google OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/adwords
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email
# ── Google Ads API ──
api:
  google-ads:
    developer-token: ${GOOGLE_ADS_DEVELOPER_TOKEN}
    client-customer-id: ${GOOGLE_ADS_CLIENT_CUSTOMER_ID}
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/v1/integrations/google-ads/callback

# ── Logging (dev) ──
logging:
  level:
    com.projetocontabil: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
