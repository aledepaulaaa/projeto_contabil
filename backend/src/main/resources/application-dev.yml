# ══════════════════════════════════════════════════════════
# Projeto Contábil — Perfil de Desenvolvimento
# ══════════════════════════════════════════════════════════

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/accounting_saas
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  # ── JPA (dev) ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ── RabbitMQ ──
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379

  # ── E-mail (Dev/Mailtrap) ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:user}
    password: ${MAIL_PASSWORD:pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Logging (dev) ──
logging:
  level:
    com.projetocontabil: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
