# ══════════════════════════════════════════════════════════
# Projeto Contábil — Perfil de Testes
# ══════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── JPA (test) ──
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # ── Flyway desabilitado em testes ──
  flyway:
    enabled: false

  # ── Auto-configs desabilitadas em testes ──
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  # ── RabbitMQ desabilitado em testes ──
  rabbitmq:
    listener:
      simple:
        auto-startup: false

  # ── Spring AI desabilitado em testes ──
  ai:
    openai:
      enabled: false

# ── Mailtrap mock para testes ──
mailtrap:
  api-token: mock-token
  sender-email: test@test.com
  sandbox: true
  inbox-id: 0

logging:
  level:
    com.projetocontabil: WARN
