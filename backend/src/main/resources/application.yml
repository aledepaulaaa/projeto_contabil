# ══════════════════════════════════════════════════════════
# Projeto Contábil — Configuração Principal
# ══════════════════════════════════════════════════════════

spring:
  application:
    name: projeto-contabil

  # ── Virtual Threads (Java 21) ──
  threads:
    virtual:
      enabled: true

  # ── JPA / Hibernate ──
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ──
logging:
  level:
    com.projetocontabil: INFO
    org.hibernate.SQL: WARN
