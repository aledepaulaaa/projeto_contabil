# ══════════════════════════════════════════════════════════
# Projeto Contábil — Perfil de Produção (Cloud)
# ══════════════════════════════════════════════════════════

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5 # Render Free tier exige pools pequenos
      minimum-idle: 1

  # ── RabbitMQ (CloudAMQP) ──
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES} # Formato host:port
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}

  # ── Redis (Upstash) ──
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL} # Upstash fornece uma URL redis://...
      
  jpa:
    hibernate:
      ddl-auto: validate # Em produção, nunca use 'update'
    show-sql: false

server:
  port: ${PORT:8080} # O Render injeta a variável PORT automaticamente
  forward-headers-strategy: native

# ── SERPRO (prod) ──
serpro:
  api-base-url: ${SERPRO_API_BASE_URL:https://gateway.apiserpro.serpro.gov.br/renda-pf/v1}
  base-url-prod: ${SERPRO_BASE_URL_PROD:https://gateway.apiserpro.serpro.gov.br/renda-pf/v1}
  token-url: ${SERPRO_TOKEN_URL:https://gateway.apiserpro.serpro.gov.br/token}
  consumer-key: ${SERPRO_CONSUMER_KEY}
  consumer-secret: ${SERPRO_CONSUMER_SECRET}
  private-key-base64: ${SERPRO_PRIVATE_KEY_BASE64}
