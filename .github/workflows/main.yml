name: CI/CD Pipeline - Accounting SaaS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend: Build & Unit/Integration Tests (TDD)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Backend Tests
        run: mvn test # Garante que o ciclo Red-Green passou

      # Frontend: Lint & Build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Deps & Build
        run: |
          cd frontend
          npm ci
          npm run build

      # E2E Tests (Playwright)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      
      - name: Run E2E Tests
        run: npx playwright test

      # Docker: Build and Push (Simulado para GitHub Packages)
      - name: Build Docker Images
        run: |
          docker build -t accounting-backend ./backend
          docker build -t accounting-frontend ./frontend
